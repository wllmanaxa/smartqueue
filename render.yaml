# Render Blueprint — Smart Queue API
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy: connect this repo in Render → New → Blueprint → select render.yaml
# Or create a Web Service manually using the build/start commands below.
#
# Live API (example): https://smartqueue-7dxl.onrender.com
# Health: https://smartqueue-7dxl.onrender.com/health
# Login: POST https://smartqueue-7dxl.onrender.com/api/v1.0/Auth/login

services:
  - type: web
    name: smartqueue-api
    runtime: dotnet
    region: oregon
    plan: free
    rootDir: Backend
    buildCommand: dotnet restore && dotnet publish -c Release -o ./publish
    startCommand: dotnet ./publish/Backend.dll
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: "true"
      - key: ConnectionStrings__DefaultConnection
        sync: false
      - key: Jwt__Key
        sync: false
      - key: Jwt__Issuer
        value: SmartQueue
      - key: Jwt__Audience
        value: SmartQueueClients
      - key: Cors__AllowedOrigins
        sync: false
      - key: Cors__AllowVercelPreviews
        value: "true"
      - key: Features__EnableSwagger
        value: "false"
